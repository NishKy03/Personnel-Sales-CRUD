<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Personnel Sales Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/site.css" rel="stylesheet">
</head>
<body>
    <script src="/js/app.js"></script>
    <div class="container-fluid">
        <div class="row p-2 bg-info">
            <div class="col-6">
                <h3>PERSONNEL-SALE MANAGEMENT</h3>
            </div>
        </div>
        <div class="row mt-3">
            <div><h4>Personnel</h4></div>
        </div>
        <div class="btn btn-warning text-end" onclick="openModal()">Create Personnel</div>
    </div>

    <div class="container-fluid mt-3">
        <table class="table table-bordered table-striped" id="PersonnelTable">
            <thead class="text-center">
                <tr>
                    <th>Personnel ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Phone Number</th>
                    <th >Action</th>
                </tr>
            </thead>
            <tbody class="text-center">
            </tbody>
        </table>
    </div>

    <div class="modal" id="PersonnelModal" #personnelModal>
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h4 class="modal-title">Create New Personnel</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" onclick="closeModal()"></button>
                </div>

                <form id="PersonnelForm">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-12">
                                <label for="PersonnelName" class="form-label">Personnel Name:</label>
                                <input type="text" id="PersonnelName" class="form-control" placeholder="eg: John Wick" />
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-6">
                                <label for="Age" class="form-label">Personnel Age:</label>
                                <input type="number" id="Age" class="form-control" placeholder="eg: 20" />
                            </div>

                            <div class="col-6">
                                <label for="PhoneNumber" class="form-label">Personnel Phone No:</label>
                                <input type="text" id="PhoneNumber" class="form-control" placeholder="eg: 0123456789" />
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-warning">Create</button>
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal" onclick="closeModal()">Close</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal" id="SalesModal" #salesModal>
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h4 class="modal-title">Sales List</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" onclick="closeModal()"></button>
                </div>
                <div class="d-flex justify-content-start px-3 mt-3">
                    <button class="ml-2 btn btn-warning" style="width:160px; white-space:nowrap; " onclick="showSaleFormSection()">Add Sales Record</button>
                </div>
                <div class="modal-body">
                    <div class="container-fluid mt-3">
                        <table class="table table-bordered table-striped" id="SalesTable">
                            <thead>
                                <tr>
                                    <th>Sale ID</th>
                                    <th>Sale Amount</th>
                                    <th>Report Date</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                    <div id="saleFormSection" class="container" style="display:none;">                       
                        <h2>Add Sales Record</h2>
                        <form id="SaleForm">
                            <div class="modal-body">
                                <div class="row">
                                    <div class="col-12">
                                        <label for="SaleAmount" class="form-label">Sales Amount:</label>
                                        <input type="number" id="SaleAmount" class="form-control" placeholder="eg: 180.00" step="0.01"/>
                                    </div>
                                </div>
                            </div>
                            <div class="col">
                                <button type="submit" class="btn btn-warning">Add</button>
                                <button type="button" class="btn btn-danger" data-bs-dismiss="modal" onclick="closeSaleFormSection()">Cancel</button>
                            </div>
                        </form>
                    </div>                  
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal" onclick="closeModal()">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div id="EditPersonnelModal" class="modal" style="display:none;">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">Edit Personnel</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" onclick="closeModal()"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <input type="hidden" id="PersonnelId"/>
                        <div class="col-12">
                            <label for="EditPersonnelName" class="form-label">Personnel Name:</label>
                            <input type="text" id="EditPersonnelName" class="form-control" placeholder="eg: John Wick" />
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-6">
                            <label for="EditAge" class="form-label">Personnel Age:</label>
                            <input type="number" id="EditAge" class="form-control" placeholder="eg: 20" />
                        </div>

                        <div class="col-6">
                            <label for="EditPhoneNumber" class="form-label">Personnel Phone No:</label>
                            <input type="text" id="EditPhoneNumber" class="form-control" placeholder="eg: 0123456789" />
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="UpdatePersonnel()" >Save</button>
                    <button type="button" class="btn btn-danger" data-bs-dsimiss="modal" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
